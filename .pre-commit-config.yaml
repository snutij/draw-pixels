repos:
  - repo: local
    hooks:
      - id: oxlint
        name: oxlint
        entry: npx oxlint
        language: system
        types: [file]
        files: \.(ts|tsx)$
        pass_filenames: true

      - id: oxfmt
        name: oxfmt
        entry: npx oxfmt --check
        language: system
        types: [file]
        files: \.(ts|tsx|json|css|md)$
        pass_filenames: true

      - id: vitest
        name: vitest
        entry: npx vitest --run --passWithNoTests
        language: system
        pass_filenames: false
        always_run: true
